name: Release

# Push a tag like v0.1.2 (or run manually) to build and publish all three
# platforms. Each OS runner builds its own native target and uploads to the
# GitHub Release matching the package.json version. A manual run lets us
# (re)build platforms for an existing release without re-tagging.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Use `npm install`, not `npm ci`: a package-lock generated on one OS
        # omits other platforms' optional native deps (@emnapi/*, rollup/esbuild
        # platform packages), which makes `npm ci` fail cross-platform. install
        # resolves them per-runner.
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build and publish
        env:
          # electron-builder reads GH_TOKEN to create/upload the GitHub release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc sign the macOS build (identity "-"). This produces a
          # structurally valid signature without a Developer ID certificate.
          # Gatekeeper shows "unidentified developer" instead of "damaged app",
          # so users can bypass with right-click → Open or Privacy & Security
          # rather than needing `xattr -cr` on the command line.
          # On Windows/Linux this env var is ignored by electron-builder.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_IDENTITY: "-"
        run: npm run publish
